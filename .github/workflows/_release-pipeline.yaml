name: _Release Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string
      service_path:
        description: "Path to the service directory"
        required: true
        type: string
    outputs:
      new_release_published:
        description: "Whether a new release was published ('true' or 'false')"
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: "Version of the new release (e.g. 1.3.0)"
        value: ${{ jobs.release.outputs.new_release_version }}

jobs:
  release:
    name: Release
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      SERVICE_PATH: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --bump
            --unreleased
            --strip header
            --tag-pattern ^${{ inputs.service_name }}-v
            --include-path ${{ inputs.service_path }}/**
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.cliff.outputs.version }}"
          VERSION="${VERSION#${SERVICE_NAME}-v}"
          VERSION="${VERSION#v}"
          TAG="${SERVICE_NAME}-v${VERSION}"

          if [ -z "$VERSION" ] || git tag --list | grep -qx "${TAG}"; then
            echo "No new release"
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "chore(release): $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/RELEASE_NOTES.md \
            --target "${{ github.sha }}"

          echo "new_release_published=true" >> $GITHUB_OUTPUT
          echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
