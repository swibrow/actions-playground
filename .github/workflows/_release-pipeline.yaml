name: _Release Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string
      service_path:
        description: "Path to the service directory"
        required: true
        type: string
    outputs:
      new_release_published:
        description: "Whether a new release was published ('true' or 'false')"
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: "Version of the new release (e.g. 1.3.0)"
        value: ${{ jobs.release.outputs.new_release_version }}

jobs:
  release:
    name: Release
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      SERVICE_PATH: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Determine release version
        id: release
        run: |
          echo "=== Debug ==="
          echo "Tags matching pattern:"
          git tag --list "${SERVICE_NAME}-v*"
          echo "Commits since last tag:"
          LAST_TAG=$(git tag --list "${SERVICE_NAME}-v*" --sort=-version:refname | head -1)
          echo "Last tag: $LAST_TAG"
          git log --oneline "${LAST_TAG}..HEAD" -- "${SERVICE_PATH}/"
          echo "=== Running git-cliff (verbose) ==="
          git-cliff \
            --verbose \
            --config cliff.toml \
            --tag-pattern "^${SERVICE_NAME}-v" \
            --include-path "${SERVICE_PATH}/**" \
            --bumped-version 2>&1 || true
          echo "=== Running git-cliff (capture) ==="
          VERSION=$(git-cliff \
            --config cliff.toml \
            --tag-pattern "^${SERVICE_NAME}-v" \
            --include-path "${SERVICE_PATH}/**" \
            --bumped-version) || true
          echo "Raw bumped-version output: '$VERSION'"
          VERSION="${VERSION#${SERVICE_NAME}-v}"
          VERSION="${VERSION#v}"
          echo "Stripped version: '$VERSION'"

          if [ -z "$VERSION" ]; then
            echo "No releasable changes"
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TAG="${SERVICE_NAME}-v${VERSION}"
          if git tag --list | grep -qx "${TAG}"; then
            echo "Tag $TAG already exists, no new release"
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Next release version: $VERSION"
          echo "new_release_published=true" >> $GITHUB_OUTPUT
          echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          git-cliff \
            --config cliff.toml \
            --tag-pattern "^${SERVICE_NAME}-v" \
            --include-path "${SERVICE_PATH}/**" \
            --bump --unreleased --strip header \
            -o /tmp/RELEASE_NOTES.md
          echo "Release notes:"
          cat /tmp/RELEASE_NOTES.md

      - name: Create tag and GitHub release
        if: steps.release.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.service_name }}-v${{ steps.release.outputs.new_release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "chore(release): $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/RELEASE_NOTES.md \
            --target "${{ github.sha }}"
