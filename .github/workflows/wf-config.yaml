name: Workflow config

on:
  push:

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.config.outputs.config }}
    steps:
      - uses: actions/checkout@v4

      - name: Workflow config
        id: config
        run: |
          config=$(yq -o=json .github/config.yaml | jq -c -r)
          echo "config=$config" >> $GITHUB_OUTPUT

  get-config:
    needs: config
    runs-on: ubuntu-latest
    steps:
      - name: Get config
        run: |
          echo ${{ toJson(needs.config.outputs.config) }}