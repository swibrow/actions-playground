name: Simple workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy to'
        type: string
        required: true

jobs:
  simple-config:
    uses: ./.github/workflows/wf-config.yaml
    with:
      environment: ${{ inputs.environment }}

  deploy:
    runs-on: ubuntu-latest
    needs: simple-config
    steps:
      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.environment }}"
          echo "Into AWS Account: ${{ needs.simple-config.outputs.aws_account_id }}"
          echo "Into AWS Region: ${{ needs.simple-config.outputs.aws_region }}"
          echo "Using AWS Role Name: ${{ needs.simple-config.outputs.aws_role_name }}"
